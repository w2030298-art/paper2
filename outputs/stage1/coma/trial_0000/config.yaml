algorithm:
  discrete: true
  gamma: 0.99
  grad_clip: 0.5
  critic_loss_coeff: 0.6
  entropy_coeff: 0.0005
  name: COMA
  num_epochs: 4
  policy_clip_high: 1.15
  policy_clip_low: 0.85
evaluation:
  num_episodes: 10
game_theory:
  cpnet_enabled: true
  ctde_with_hints: true
  efx_enabled: true
  efx_transfer_rate: 0.5
  enabled: true
  reward_weights:
  - 0.8
  - 0.1
  - 0.1
  use_shapley_credit: true
  warm_start_lr_scale: 0.3
  warm_start_steps: 4000
logging:
  checkpoint_dir: checkpoints/coma
  eval_interval: 2500
  log_interval: 10
  save_interval: 50000
  min_eval_points: 32
  eval_at_start: true
network:
  hidden_dim: 384
training:
  lr: 0.0001
  rollout_steps: 2048
  seed: 42
  total_timesteps: 100000
stage1_tuning:
  trial_id: '0000'
  trial_name: COMA-L
  source_search_config: configs/tuning/stage1_coma_mainline_a.yaml
  environment_profile: mainline-a
