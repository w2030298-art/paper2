algorithm:
  batch_size: 256
  buffer_size: 1000000
  epsilon_decay: 50000
  epsilon_end: 0.05
  epsilon_start: 1.0
  gamma: 0.99
  mixer_hidden_dim: 64
  n_agents: 2
  name: QMIX
  target_update_interval: 200
  tau: 0.005
  type: off_policy
  update_interval: 1
evaluation:
  deterministic: true
  num_episodes: 10
game_theory:
  cpnet_enabled: true
  ctde_with_hints: true
  efx_enabled: true
  efx_transfer_rate: 0.5
  enabled: true
  reward_weights:
  - 0.8
  - 0.1
  - 0.1
  use_shapley_credit: true
  warm_start_lr_scale: 0.5
  warm_start_steps: 1000
logging:
  checkpoint_dir: checkpoints/qmix
  eval_interval: 10000
  log_dir: logs/qmix
  log_interval: 10
  save_interval: 50000
network:
  activation: relu
  discrete: true
  hidden_dim: 64
training:
  lr: 0.0003
  lr_schedule: false
  seed: 42
  start_steps: 10000
  total_timesteps: 500000
