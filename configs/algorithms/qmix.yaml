# QMIX Configuration
# QMIX: Monotonic Value Function Factorisation - 离散动作空间，多智能体

algorithm:
  name: "QMIX"
  type: "off_policy"
  gamma: 0.99
  tau: 0.005
  batch_size: 256
  buffer_size: 1000000
  update_interval: 1
  target_update_interval: 200
  n_agents: 2
  mixer_hidden_dim: 64
  epsilon_start: 1.0
  epsilon_end: 0.05
  epsilon_decay: 50000

network:
  hidden_dim: 64
  activation: "relu"
  discrete: true

training:
  total_timesteps: 500000
  start_steps: 10000
  lr: 3.0e-4
  lr_schedule: false
  seed: 42

logging:
  log_interval: 10
  eval_interval: 10000
  save_interval: 50000
  log_dir: "logs/qmix"
  checkpoint_dir: "checkpoints/qmix"

evaluation:
  num_episodes: 10
  deterministic: true
game_theory:
  enabled: true
  use_shapley_credit: true
  ctde_with_hints: true
  warm_start_steps: 1000
  warm_start_lr_scale: 0.5
  shapley_samples: 128
  reward_weights: [0.5, 0.3, 0.2]
