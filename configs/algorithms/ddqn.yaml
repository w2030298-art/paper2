algorithm:
  batch_size: 256
  buffer_size: 1000000
  gamma: 0.99
  name: DDQN
  target_update_interval: 500
  tau: 0.005
  type: off_policy
  update_interval: 1
evaluation:
  deterministic: true
  num_episodes: 10
exploration:
  epsilon_decay: 120000
  epsilon_end: 0.08
  epsilon_start: 1.0
game_theory:
  cpnet_enabled: true
  ctde_with_hints: false
  efx_enabled: true
  efx_transfer_rate: 0.5
  enabled: true
  reward_weights:
  - 0.8
  - 0.1
  - 0.1
  use_shapley_credit: false
  warm_start_lr_scale: 0.5
  warm_start_steps: 0
logging:
  checkpoint_dir: checkpoints/ddqn
  eval_interval: 2500
  log_dir: logs/ddqn
  log_interval: 10
  save_interval: 50000
  min_eval_points: 32
  eval_at_start: true
network:
  activation: relu
  discrete: true
  hidden_dim: 256
training:
  lr: 0.0002
  lr_schedule: false
  seed: 42
  start_steps: 5000
  total_timesteps: 500000
