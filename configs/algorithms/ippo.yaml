algorithm:
  discrete: true
  eps_clip: 0.2
  gae_lambda: 0.95
  gamma: 0.99
  name: IPPO
  num_epochs: 10
evaluation:
  num_episodes: 10
game_theory:
  cpnet_enabled: true
  ctde_with_hints: true
  efx_enabled: true
  efx_transfer_rate: 0.5
  enabled: true
  reward_weights:
  - 0.8
  - 0.1
  - 0.1
  use_shapley_credit: true
  warm_start_lr_scale: 0.5
  warm_start_steps: 1000
logging:
  checkpoint_dir: checkpoints/ippo
  eval_interval: 5000
  log_interval: 10
  save_interval: 50000
network:
  hidden_dim: 256
training:
  lr: 0.0003
  rollout_steps: 2048
  seed: 42
  total_timesteps: 100000
