# A3C Configuration
# Asynchronous Advantage Actor-Critic - 离散/连续均支持

algorithm:
  name: "A3C"
  type: "on_policy"
  gamma: 0.99
  num_steps: 20
  num_workers: 4
  discrete: true

network:
  hidden_dim: 256
  activation: "relu"

training:
  total_timesteps: 500000
  rollout_steps: 20
  batch_size: 64
  lr: 3.0e-4
  lr_schedule: false
  seed: 42
  max_grad_norm: 0.5

exploration:
  entropy_coef: 0.01
  value_coef: 0.5

logging:
  log_interval: 10
  eval_interval: 10000
  save_interval: 50000
  log_dir: "logs/a3c"
  checkpoint_dir: "checkpoints/a3c"

evaluation:
  num_episodes: 10
  deterministic: true
game_theory:
  enabled: true
  use_shapley_credit: false
  ctde_with_hints: false
  warm_start_steps: 0
  warm_start_lr_scale: 0.5
  shapley_samples: 128
  reward_weights: [0.5, 0.3, 0.2]
