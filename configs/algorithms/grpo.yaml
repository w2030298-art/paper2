algorithm:
  entropy_coef: 0.01
  eps_clip: 0.2
  gamma: 0.99
  group_size: 4
  max_grad_norm: 0.5
  name: GRPO
  num_epochs: 10
  type: on_policy
  value_coef: 0.5
evaluation:
  deterministic: true
  num_episodes: 10
exploration:
  epsilon_decay_steps: 50000
  final_epsilon: 0.05
  initial_epsilon: 1.0
game_theory:
  cpnet_enabled: true
  ctde_with_hints: true
  efx_enabled: true
  efx_transfer_rate: 0.5
  enabled: true
  reward_weights:
  - 0.8
  - 0.1
  - 0.1
  use_shapley_credit: true
  warm_start_lr_scale: 0.5
  warm_start_steps: 1000
logging:
  checkpoint_dir: checkpoints/grpo
  eval_interval: 10000
  log_dir: logs/grpo
  log_interval: 10
  save_interval: 50000
network:
  activation: relu
  discrete: true
  hidden_dim: 256
training:
  batch_size: 64
  lr: 0.0003
  lr_schedule: false
  rollout_steps: 2048
  seed: 42
  total_timesteps: 500000
