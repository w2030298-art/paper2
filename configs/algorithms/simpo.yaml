# SimPO Configuration
# Simple Preference Optimization - 燭汃雄釬諾潔

algorithm:
  name: "SimPO"
  type: "on_policy"
  gamma: 0.99
  beta: 0.1
  ref_coeff: 0.2
  num_epochs: 10
  discrete: true

network:
  hidden_dim: 256
  activation: "relu"
  discrete: true

training:
  total_timesteps: 500000
  rollout_steps: 2048
  batch_size: 64
  lr: 3.0e-4
  lr_schedule: false
  seed: 42
  max_grad_norm: 0.5

exploration:
  entropy_coef: 0.01
  value_coef: 0.5

logging:
  log_interval: 10
  eval_interval: 10000
  save_interval: 50000
  log_dir: "logs/simpo"
  checkpoint_dir: "checkpoints/simpo"

evaluation:
  num_episodes: 10
  deterministic: true
game_theory:
  enabled: true
  use_shapley_credit: false
  ctde_with_hints: false
  warm_start_steps: 0
  warm_start_lr_scale: 0.5

  reward_weights: [0.8, 0.1, 0.1]
  efx_enabled: true
  cpnet_enabled: true
  efx_transfer_rate: 0.5

