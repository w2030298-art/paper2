algorithm:
  beta: 0.1
  discrete: true
  gamma: 0.99
  name: SimPO
  num_epochs: 10
  ref_coeff: 0.2
  type: on_policy
evaluation:
  deterministic: true
  num_episodes: 10
exploration:
  entropy_coef: 0.01
  value_coef: 0.5
game_theory:
  cpnet_enabled: true
  ctde_with_hints: false
  efx_enabled: true
  efx_transfer_rate: 0.5
  enabled: true
  reward_weights:
  - 0.8
  - 0.1
  - 0.1
  use_shapley_credit: false
  warm_start_lr_scale: 0.5
  warm_start_steps: 0
logging:
  checkpoint_dir: checkpoints/simpo
  eval_interval: 10000
  log_dir: logs/simpo
  log_interval: 10
  save_interval: 50000
network:
  activation: relu
  discrete: true
  hidden_dim: 256
training:
  batch_size: 64
  lr: 0.0003
  lr_schedule: false
  max_grad_norm: 0.5
  rollout_steps: 2048
  seed: 42
  total_timesteps: 500000
