algorithm:
  batch_size: 2048
  cg_damping: 0.001
  cg_iterations: 10
  discrete: true
  gae_lambda: 0.95
  gamma: 0.99
  max_kl: 0.008
  name: TRPO
  num_epochs: 5
  type: on_policy
evaluation:
  deterministic: true
  num_episodes: 10
exploration:
  entropy_coef: 0.01
game_theory:
  cpnet_enabled: true
  ctde_with_hints: false
  efx_enabled: true
  efx_transfer_rate: 0.5
  enabled: true
  reward_weights:
  - 0.8
  - 0.1
  - 0.1
  use_shapley_credit: false
  warm_start_lr_scale: 0.5
  warm_start_steps: 0
logging:
  checkpoint_dir: checkpoints/trpo
  eval_interval: 2500
  log_dir: logs/trpo
  log_interval: 10
  save_interval: 50000
  min_eval_points: 32
  eval_at_start: true
network:
  activation: relu
  hidden_dim: 256
training:
  lr: 0.0003
  lr_schedule: false
  rollout_steps: 2048
  seed: 42
  total_timesteps: 500000
