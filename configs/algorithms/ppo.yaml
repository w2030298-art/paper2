# PPO Configuration
# Proximal Policy Optimization - 离散/连续均支持

algorithm:
  name: "PPO"
  type: "on_policy"
  gamma: 0.99
  gae_lambda: 0.95
  eps_clip: 0.2
  num_epochs: 10
  clip_grad: 0.5
  value_coeff: 0.5
  ent_coeff: 0.01

network:
  hidden_dim: 256
  activation: "relu"
  discrete: true

training:
  total_timesteps: 500000
  rollout_steps: 2048
  batch_size: 64
  lr: 3.0e-4
  lr_schedule: false
  seed: 42

exploration:
  initial_epsilon: 1.0
  final_epsilon: 0.05
  epsilon_decay_steps: 50000

logging:
  log_interval: 10
  eval_interval: 10000
  save_interval: 50000
  log_dir: "logs/ppo"
  checkpoint_dir: "checkpoints/ppo"

evaluation:
  num_episodes: 10
  deterministic: true
game_theory:
  enabled: true
  use_shapley_credit: false
  ctde_with_hints: false
  warm_start_steps: 0
  warm_start_lr_scale: 0.5
  shapley_samples: 128
  reward_weights: [0.5, 0.3, 0.2]
