algorithm:
  clip_grad: 0.5
  ent_coeff: 0.005
  eps_clip: 0.15
  gae_lambda: 0.95
  gamma: 0.99
  name: PPO
  num_epochs: 10
  type: on_policy
  value_coeff: 0.5
evaluation:
  deterministic: true
  num_episodes: 10
exploration:
  epsilon_decay_steps: 50000
  final_epsilon: 0.05
  initial_epsilon: 1.0
game_theory:
  cpnet_enabled: true
  ctde_with_hints: false
  efx_enabled: true
  efx_transfer_rate: 0.5
  enabled: true
  reward_weights:
  - 0.8
  - 0.1
  - 0.1
  use_shapley_credit: false
  warm_start_lr_scale: 0.5
  warm_start_steps: 0
logging:
  checkpoint_dir: checkpoints/ppo
  eval_interval: 2500
  log_dir: logs/ppo
  log_interval: 10
  save_interval: 50000
  min_eval_points: 32
  eval_at_start: true
network:
  activation: relu
  discrete: true
  hidden_dim: 256
training:
  batch_size: 64
  lr: 0.0002
  lr_schedule: false
  rollout_steps: 2048
  seed: 42
  total_timesteps: 500000
