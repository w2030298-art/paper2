# SAC Configuration
# Soft Actor-Critic - 连续动作空间

algorithm:
  name: "SAC"
  type: "off_policy"
  gamma: 0.99
  tau: 0.005
  alpha: 0.2
  automatic_entropy_tuning: true
  batch_size: 256
  buffer_size: 1000000

network:
  hidden_dim: 256
  activation: "relu"
  discrete: false
  log_std_min: -20
  log_std_max: 2

training:
  total_timesteps: 500000
  start_steps: 10000
  lr: 3.0e-4
  lr_schedule: false
  seed: 42
  update_interval: 1

exploration:
  initial_epsilon: 1.0
  final_epsilon: 0.05
  epsilon_decay_steps: 50000

logging:
  log_interval: 10
  eval_interval: 10000
  save_interval: 50000
  log_dir: "logs/sac"
  checkpoint_dir: "checkpoints/sac"

evaluation:
  num_episodes: 10
  deterministic: true
game_theory:
  enabled: true
  use_shapley_credit: false
  ctde_with_hints: false
  warm_start_steps: 0
  warm_start_lr_scale: 0.5
  shapley_samples: 128
  reward_weights: [0.5, 0.3, 0.2]
