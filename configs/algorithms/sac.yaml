algorithm:
  alpha: 0.2
  automatic_entropy_tuning: true
  batch_size: 256
  buffer_size: 1000000
  gamma: 0.99
  name: SAC
  tau: 0.005
  type: off_policy
evaluation:
  deterministic: true
  num_episodes: 10
exploration:
  epsilon_decay_steps: 50000
  final_epsilon: 0.05
  initial_epsilon: 1.0
game_theory:
  cpnet_enabled: true
  ctde_with_hints: false
  efx_enabled: true
  efx_transfer_rate: 0.5
  enabled: true
  reward_weights:
  - 0.8
  - 0.1
  - 0.1
  use_shapley_credit: false
  warm_start_lr_scale: 0.5
  warm_start_steps: 0
logging:
  checkpoint_dir: checkpoints/sac
  eval_interval: 10000
  log_dir: logs/sac
  log_interval: 10
  save_interval: 50000
network:
  activation: relu
  discrete: false
  hidden_dim: 256
  log_std_max: 2
  log_std_min: -20
training:
  lr: 0.0003
  lr_schedule: false
  seed: 42
  start_steps: 10000
  total_timesteps: 500000
  update_interval: 1
