algorithm:
  name: MADDPG
  gamma: 0.99
  tau: 0.005
  batch_size: 256
network:
  hidden_dim: 256
training:
  total_timesteps: 100000
  rollout_steps: 2048
  lr: 3.0e-4
  seed: 42
evaluation:
  num_episodes: 10
logging:
  eval_interval: 5000
  save_interval: 50000
  checkpoint_dir: checkpoints/maddpg
  log_interval: 10
game_theory:
  enabled: true
  use_shapley_credit: true
  ctde_with_hints: true
  warm_start_steps: 1000
  warm_start_lr_scale: 0.5

  reward_weights: [0.8, 0.1, 0.1]
  efx_enabled: true
  cpnet_enabled: true
  efx_transfer_rate: 0.5

